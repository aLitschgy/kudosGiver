<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="kudos.css" />
  </head>

  <body>
    <div id="popup-content">
      <h2>Kudos Giver</h2>
      <div id="not-strava">
        <p>
          This extension only works on Strava. Please navigate to
          <a href="https://www.strava.com/dashboard" id="strava-link"
            >Strava's Dashboard</a
          >.
        </p>
      </div>
      <div id="strava">
        <p>Hello <span id="username"></span></p>
        <button id="send">Click to give kudos</button>
        <p>Kudos given : <span id="activity-count">...</span></p>
        <div class="switch-container">
          <label class="switch">
            <input type="checkbox" id="auto-kudos-toggle" />
            <span class="slider"></span>
          </label>
          <span class="switch-label">Enable autokudos</span>
        </div>
      </div>
    </div>

    <script src="kudos.js"></script>
  </body>
</html>
