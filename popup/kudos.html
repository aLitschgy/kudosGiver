<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="kudos.css" />
  </head>

  <body>
    <div id="popup-content">
      <h2>Kudos Giver</h2>
      <div id="not-strava">
        <p>
          This extension only works on Strava. Please navigate to
          <a href="https://www.strava.com" id="strava-link">Strava</a>.
        </p>
      </div>
      <div id="strava">
        <p>Bonjour <span id="username"></span></p>
        <button id="send">Click to give kudos</button>
        <p>
          Activités actuellement chargées : <span id="activity-count">0</span>
        </p>
      </div>
    </div>

    <script src="kudos.js"></script>
  </body>
</html>
